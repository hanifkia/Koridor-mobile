<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset</title>
<style>
    body { margin:0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f6f9fc; color:#333; }
    .container { max-width:600px; margin:30px auto; background-color:#fff; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.1); overflow:hidden; }
    .header { background-color:#0a84ff; padding:30px; text-align:center; color:white; }
    .header h1 { margin:0; font-size:28px; }
    .content { padding:30px; }
    .content h2 { color:#0a84ff; margin-top:0; }
    .btn { display:inline-block; background-color:#0a84ff; color:white; padding:12px 25px; border-radius:6px; text-decoration:none; font-weight:bold; margin-top:20px; }
    .footer { font-size:12px; color:#888; text-align:center; padding:20px; border-top:1px solid #eee; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Password Reset Request</h1>
    </div>
    <div class="content">
        <h2>Hello {{ name }},</h2>
        <p>We received a request to reset your password. Use the verification code below to proceed:</p>
        <p style="text-align:center; font-size:24px; font-weight:bold; color:#0a84ff;">{{ code }}</p>
        <p>If you didn’t request a password reset, please ignore this email.</p>
    </div>
    <div class="footer">
        &copy; 2026 Ecolosplus. All rights reserved.
        <div style="display:none; font-size:1px; line-height:1px;">&#8203;</div>
    </div>
</div>
</body>
</html>
