services:

  # ------------------------------------------------------------------ PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ecolos-postgres
    expose:
    - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecolos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecolos_db"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network
      - traefik_net

  # ------------------------------------------------------------------ Redis
  redis:
    image: redis:7-alpine
    container_name: ecolos-redis
    expose:
    - "6379"
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass redispassword
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

  # ------------------------------------------------------------------ Database Migrations
  db-migrate:
    build:
      context: .
      dockerfile: migrations/Dockerfile.migrations
    container_name: ecolos-db-migrate
    working_dir: /app/migrations
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ecolos_db
      PYTHONPATH: /app
    volumes:
      # Mount entire project from root
      - .:/app
      # Keep migration cache for faster rebuilds
      - migration_cache:/app/.alembic_cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - app-network
    command: >
      bash -c "
        echo '📁 Checking setup...' &&
        ls -la /app/migrations/alembic.ini &&
        ls -la /app/migrations/alembic/env.py &&
        echo '' &&
        echo '🔄 Running Alembic migrations...' &&
        cd /app/migrations &&
        alembic upgrade head &&
        echo '' &&
        echo '🌱 Seeding database...' &&
        cd /app &&
        python -m migrations.scripts.seed_all &&
        echo '✅ Database ready!'
      "

  # ------------------------------------------------------------------ Core Application Service
  ecolos-core:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
    - "8000"
    volumes:
      # Mount entire project for live reload
      - .:/app
      # Exclude unnecessary directories to improve performance
      - /app/.git
      - /app/__pycache__
      - /app/.pytest_cache
      - /app/.venv
      - /app/node_modules
      # Mount logs separately for persistence
      - ./logs:/app/logs
      # Mount uploads separately for persistence
      - ./uploads:/app/uploads
    environment:
      DEBUG: "True"
      PYTHONPATH: /app
      APP_NAME: "ecolos-core"
      APP_VERSION: "1.0.0"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/ecolos_db"
      REDIS_URL: "redis://:redispassword@redis:6379/2"
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: "your-super-secret-key-change-in-production"  # ← ADD THIS
      JWT_ALGORITHM: "HS256"
      BCRYPT_LOG_ROUNDS: "12"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    networks:
      - app-network
      - traefik_net
    command: sh -c "echo '🚀 Starting Ecolos Core Application...' && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.ecolos-core.rule=Host(`api.driver-mobile-app.ecolosplus.se`)"
      - "traefik.http.routers.ecolos-core.tls=true"
      - "traefik.http.routers.ecolos-core.tls.certResolver=myresolver"

# ------------------------------------------------------------------ Volumes
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local
  migration_cache:
    driver: local

# ------------------------------------------------------------------ Networks
networks:
  app-network:
    driver: bridge
  traefik_net:
    external: true
    name: integrated_dev_default